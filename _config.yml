title: UnifAPI
description: >-
  UnifAPI is a unified public-data API for AI agents. Call Twitter, YouTube,
  TikTok, Instagram, Reddit, Threads, Google SERP, Bing SERP, Google Trends,
  web scrape, and news from a single endpoint, with one API key, one bill,
  and pay-per-call pricing — no subscriptions.

url: https://unif-api.github.io
baseurl: /unifapi

repository: unif-api/unifapi

remote_theme: just-the-docs/just-the-docs

color_scheme: light
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/unif-api/unifapi"
  "unifapi.com":
    - "https://unifapi.com"
aux_links_new_tab: true

nav_external_links:
  - title: API catalog (unifapi.com)
    url: https://unifapi.com/apis
  - title: Pricing
    url: https://unifapi.com/pricing
  - title: MCP server
    url: https://unifapi.com/mcp

footer_content: >-
  &copy; UnifAPI · <a href="https://unifapi.com">unifapi.com</a> ·
  <a href="https://github.com/unif-api/unifapi">GitHub</a>

# Optional callouts used by some pages (not required)
callouts:
  note:
    color: blue

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-readme-index

permalink: pretty

exclude:
  - LICENSE
  - .gitignore
  - scripts/
